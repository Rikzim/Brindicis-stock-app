services:
  frontend:
    build: .
    ports:
      - "5176:5176"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./.env:/app/.env
      - ../Brindicis-backend/packages/api-client/dist:/app/node_modules/@brindicis/api-client
